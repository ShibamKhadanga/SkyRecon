<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer radar circle -->
  <circle cx="32" cy="32" r="28" stroke="url(#g)" stroke-width="2" fill="none" opacity="0.3" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="20" stroke="url(#g)" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Radar sweep -->
  <path d="M32 32 L32 4" stroke="url(#g)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <!-- Drone body -->
  <rect x="26" y="29" width="12" height="6" rx="3" fill="url(#g)" filter="url(#glow)"/>
  <!-- Drone arms -->
  <line x1="22" y1="28" x2="28" y2="31" stroke="url(#g)" stroke-width="2"/>
  <line x1="42" y1="28" x2="36" y2="31" stroke="url(#g)" stroke-width="2"/>
  <line x1="22" y1="36" x2="28" y2="33" stroke="url(#g)" stroke-width="2"/>
  <line x1="42" y1="36" x2="36" y2="33" stroke="url(#g)" stroke-width="2"/>
  <!-- Propellers -->
  <circle cx="22" cy="28" r="4" stroke="url(#g)" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="42" cy="28" r="4" stroke="url(#g)" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="22" cy="36" r="4" stroke="url(#g)" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="42" cy="36" r="4" stroke="url(#g)" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Center eye/lens -->
  <circle cx="32" cy="32" r="2" fill="url(#g)" filter="url(#glow)"/>
</svg>
